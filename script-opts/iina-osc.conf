# IINA-style floating pill OSC for mpv
# Configuration file — place in ~/.config/mpv/script-opts/iina-osc.conf
# All options below show their defaults (uncomment and modify as needed)

# --- Visibility ---
# showwindowed=yes
# showfullscreen=yes
# idlescreen=yes
# visibility=auto                  # auto / always / never
# visibility_modes=never_auto_always

# --- Scaling ---
# scalewindowed=1.0
# scalefullscreen=1.0
# vidscale=auto

# --- Timing ---
# hidetimeout=1200                 # ms before OSC auto-hides
# fadeduration=200                 # ms for fade in/out animation
# fadein=yes
# minmousemove=0

# --- Pill Geometry ---
# pill_max_width=720               # max pill width in virtual px
# pill_width_ratio=0.88            # pill width as fraction of window
# pill_height=64                   # total pill height
# pill_bottom_margin=32            # gap between pill bottom and window bottom

# --- Seekbar ---
# seekbar_fg_color=#FFFFFF         # progress fill + knob
# seekbar_bg_color=#48484A         # track background
# seekbar_cache_color=#636366      # buffer range indicator
# seekbar_handle_size=0.85          # knob size (fraction of row height)
# seekbarkeyframes=yes             # use keyframes when dragging
# chapter_marker_color=#FFD60A     # chapter tick color

# --- Appearance ---
# background_color=#1C1C1E         # pill background (macOS System Gray 6 dark)
# background_alpha=40              # pill transparency (0=opaque, 255=invisible)
# panel_blur=2                     # edge softening blur (0-40)
# icons_color=#FFFFFF              # button icon color
# text_color=#F2F2F7               # time code text color
# title_color=#EBEBF5              # title text color
# held_element_color=#8E8E93       # pressed state color
# hover_color=#0A84FF              # hover accent color

# --- Time Display ---
# timetotal=no                     # show total time (no = show remaining)
# remaining_playtime=yes           # use playtime (speed-aware) for remaining
# timems=no                        # show milliseconds
# unicodeminus=no                  # use Unicode minus sign

# --- Controls Visibility ---
# chapter_buttons=yes              # show chapter skip buttons
# volume_control=yes               # show volume icon
# audio_button=yes                 # show audio track button
# subtitle_button=yes              # show subtitle track button
# fullscreen_button=yes            # show fullscreen toggle

# --- Seekbar Range ---
# seekrangestyle=inverted          # bar / line / inverted / none
# seekrangealpha=200
# chapter_fmt=Chapter: %s          # chapter title on seekbar hover ("no" to disable)

# --- Scroll Controls ---
# scrollcontrols=yes

# --- Window Controls ---
# windowcontrols=auto              # auto / yes / no
# windowcontrols_alignment=right   # left / right

# --- Title ---
# title=${!playlist-count==1:[${playlist-pos-1}/${playlist-count}] }${media-title}
